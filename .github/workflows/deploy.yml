name: 웹사이트 배포 (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
  # 스크레이프 워크플로 성공 시 자동 배포(GITHUB_TOKEN 푸시는 push 트리거를 못 깨우므로 필요).
  # 워크플로 name 과 정확히 일치해야 함.
  workflow_run:
    workflows:
      - "데이터 수집·집계 (증분)"
      - "데이터 수집·집계 (전체 월 스캔)"
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건만 유지
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # workflow_run 으로 트리거됐을 땐 상위 워크플로 성공 시에만 실행(실패면 스킵).
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        env:
          # GitHub Pages 프로젝트 사이트 경로(= 리포명). 사용자/조직 페이지면 "/" 로 변경.
          VITE_BASE: /U18-baseball-player-Stats/
        run: npm run build

      - name: SPA fallback (client routing)
        run: cp web/dist/index.html web/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
