name: 데이터 수집·집계 (일정·기록 증분)

# 일정 증분 + 신규 경기 기록만 — 하루 여러 번 가볍게 돈다.
# 선수현황(로스터/팀)은 별도 워크플로(teams.yml, 하루 2회)로 분리.
# 전체 월 재스캔은 scrape-full.yml (수동 전용).

on:
  schedule:
    # UTC 기준 (KST = UTC+9): 12:00 / 15:00 / 18:00 / 21:00 / 24:00 KST
    - cron: "0 3,6,9,12,15 * * *"
  workflow_dispatch: # 수동 실행

permissions:
  contents: write # data/ 커밋용

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # 큐잉 시점 커밋이 아닌 실행 시점의 최신 main (연달아 실행 시 push 충돌 방지)

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scraper/package-lock.json

      - name: Install
        working-directory: scraper
        run: npm ci

      # 경기일정 페이지용 일정/결과 데이터 (data/{year}/schedule.json — 증분)
      - name: Refresh schedule (경기일정 — 증분)
        working-directory: scraper
        run: npm run schedule

      # 신규 경기 수집 → 신규 선수 공식기록 증분 수집 → 재집계 (마지막 갱신 이후만)
      - name: Scrape new games & re-aggregate
        working-directory: scraper
        run: npm run scrape

      - name: Commit data changes
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): 일정·기록 증분 $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin main # 수집 중 다른 push가 있었으면 그 위로 재적용
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # u81-baseball(정적 HTML 앱) 일정 페이지 동기화 — 일정 데이터만 반영.
  # secrets.MERGE_REPO_TOKEN: u81-baseball 저장소 contents write 권한 PAT 필요.
  # 수동 실행(workflow_dispatch)은 데이터 변경이 없어도 강제 동기화 — u81 밀림 복구/점검용.
  sync-merge:
    needs: scrape
    if: needs.scrape.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      # 토큰이 없으면 조용히 넘어가지 말고 실패시킨다(PAT 만료·시크릿 누락을 즉시 인지).
      - name: 토큰 확인
        env:
          T: ${{ secrets.MERGE_REPO_TOKEN }}
        run: |
          if [ -z "$T" ]; then
            echo "::error::MERGE_REPO_TOKEN 시크릿이 없습니다 (base 저장소 Settings → Secrets and variables → Actions → Repository secrets)"
            exit 1
          fi
          echo "토큰 확인됨"

      - uses: actions/checkout@v4
        with:
          ref: main # scrape 잡이 방금 푸시한 최신 데이터 기준

      - uses: actions/checkout@v4
        with:
          repository: namgungjinwonng/u81-baseball
          token: ${{ secrets.MERGE_REPO_TOKEN }}
          path: u81
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 스키마 동일(u18_schedule.json = schedule.json)이라 복사 후 일정 페이지만 재생성.
      - name: 일정 데이터 반영 + docs 재생성 (일정만)
        run: |
          cp data/2026/schedule.json u81/u18_schedule.json
          cd u81
          python build_all.py --generate-schedule

      - name: u81-baseball 커밋 & 푸시
        working-directory: u81
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/u18_schedule.html docs/u18_schedule_data.js u18_schedule.json u18_schedule.html u18_schedule_data.js
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "일정 동기화 — U18-baseball-player-Stats ($(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST'))"
            git pull --rebase origin main
            git push
          fi
